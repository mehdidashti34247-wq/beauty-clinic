{% extends "base.html" %}
{% block content %}
<div class="header" style="position: relative;">
    <button class="back-btn" onclick="history.back()">‹</button>
    <h1>✏️ ویرایش مشتری</h1>
</div>

<div class="container">
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="card">
            <div class="input-group">
                <label>👤 نام و نام خانوادگی</label>
                <input type="text" name="name" value="{{ customer.name }}" required>
            </div>
            
            <div class="input-group">
                <label>📱 شماره تلفن</label>
                <input type="tel" name="phone" value="{{ customer.phone }}" required>
            </div>
            
            <div class="input-group">
                <label>💉 نوع خدمات</label>
                <select name="service">
                    {% for s in ["لیزر", "تزریق بوتاکس", "تزریق ژل", "لاغری", "آمپول لاغری", "مزوتراپی", "میکرونیدلینگ", "پاکسازی پوست", "فیشیال", "سایر"] %}
                    <option {% if s == customer.service %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="input-group">
                <label>📅 تاریخ نوبت بعدی</label>
                <input type="text" name="next_appointment" id="datepicker-edit" value="{{ customer.next_appointment or '' }}" placeholder="روی این کادر کلیک کنید" readonly style="cursor: pointer; background: white;">
            </div>
            
            <div class="input-group">
                <label>📝 یادداشت</label>
                <textarea name="notes" rows="3">{{ customer.notes or '' }}</textarea>
            </div>
        </div>
        
        <button type="submit" class="btn btn-success">💾 ذخیره تغییرات</button>
        <a href="{{ url_for('customers_list') }}" class="btn btn-secondary">❌ انصراف</a>
    </form>
</div>

<script>
    $(document).ready(function() {
        $("#datepicker-edit").persianDatepicker({
            format: 'YYYY/MM/DD',
            autoClose: true,
            initialValue: false,
            observer: true,
            persianDigit: false,
            toolbox: {
                calendarSwitch: {
                    enabled: false
                }
            },
            navigator: {
                scroll: {
                    enabled: false
                },
                text: {
                    btnNextText: '>',
                    btnPrevText: '<'
                }
            }
        });
    });
</script>
{% endblock %}
