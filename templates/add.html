{% extends "base.html" %}
{% block content %}
<div class="header" style="position: relative;">
    <button class="back-btn" onclick="history.back()">‹</button>
    <h1>➕ افزودن مشتری</h1>
</div>

<div class="container">
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="card">
            <div class="input-group">
                <label>👤 نام و نام خانوادگی</label>
                <input type="text" name="name" required>
            </div>
            
            <div class="input-group">
                <label>📱 شماره تلفن</label>
                <input type="tel" name="phone" placeholder="09121234567" required>
            </div>
            
            <div class="input-group">
                <label>💉 نوع خدمات</label>
                <select name="service">
                    <option>لیزر</option>
                    <option>تزریق بوتاکس</option>
                    <option>تزریق ژل</option>
                    <option>لاغری</option>
                    <option>آمپول لاغری</option>
                    <option>مزوتراپی</option>
                    <option>میکرونیدلینگ</option>
                    <option>پاکسازی پوست</option>
                    <option>فیشیال</option>
                    <option>سایر</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>📅 تاریخ نوبت بعدی</label>
                <input type="text" name="next_appointment" id="datepicker-add" placeholder="روی این کادر کلیک کنید" readonly style="cursor: pointer; background: white;">
            </div>
            
            <div class="input-group">
                <label>📝 یادداشت</label>
                <textarea name="notes" rows="3"></textarea>
            </div>
        </div>
        
        <button type="submit" class="btn btn-success">💾 ذخیره</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">❌ انصراف</a>
    </form>
</div>

<script>
    $(document).ready(function() {
        $("#datepicker-add").persianDatepicker({
            format: 'YYYY/MM/DD',
            autoClose: true,
            initialValue: false,
            observer: true,
            persianDigit: false,
            toolbox: {
                calendarSwitch: {
                    enabled: false
                }
            },
            navigator: {
                scroll: {
                    enabled: false
                },
                text: {
                    btnNextText: '>',
                    btnPrevText: '<'
                }
            }
        });
    });
</script>
{% endblock %}
